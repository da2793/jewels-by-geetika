<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jewels by Geetika – Box Label</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Jost:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    @page { size: 4in 3in; margin: 0; }
    body { width: 4in; height: 3in; background: #F9F6F1; display: flex; align-items: center; justify-content: center; font-family: 'Jost', sans-serif; }
    /* 4x3 inch at 96dpi = 384x288px */
    .label {
      width: 384px;
      height: 288px;
      background: linear-gradient(135deg, #FFFFFF 0%, #FDFCFA 50%, #F9F6F1 100%);
      border-radius: 18px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 0.5px solid rgba(200,168,75,0.4);
    }
    .label::before { content: ""; position: absolute; inset: 4px; border: 0.5px solid rgba(200,168,75,0.25); border-radius: 14px; pointer-events: none; }
    /* Corner marks */
    .corner { position: absolute; width: 14px; height: 14px; }
    .c-tl { top: 10px; left: 10px; border-top: 0.8px solid #C8A84B; border-left: 0.8px solid #C8A84B; border-radius: 2px 0 0 0; }
    .c-tr { top: 10px; right: 10px; border-top: 0.8px solid #C8A84B; border-right: 0.8px solid #C8A84B; border-radius: 0 2px 0 0; }
    .c-bl { bottom: 10px; left: 10px; border-bottom: 0.8px solid #C8A84B; border-left: 0.8px solid #C8A84B; border-radius: 0 0 0 2px; }
    .c-br { bottom: 10px; right: 10px; border-bottom: 0.8px solid #C8A84B; border-right: 0.8px solid #C8A84B; border-radius: 0 0 2px 0; }
    /* Top */
    .top { display: flex; flex-direction: column; align-items: center; z-index: 2; }
    .logo { width: 60px; height: 60px; object-fit: contain; margin-bottom: 6px; }
    .brand { font-family: 'Cinzel', serif; font-size: 16px; font-weight: 700; color: #2E2404; letter-spacing: 3px; }
    .tagline { font-size: 7px; letter-spacing: 2.5px; color: #574508; text-transform: uppercase; margin-top: 4px; }
    /* Divider */
    .divider { display: flex; align-items: center; gap: 6px; margin: 12px 0 10px; width: 280px; z-index: 2; }
    .divider-line { flex: 1; height: 0.4px; background: linear-gradient(90deg, transparent, #C8A84B 40%, #C8A84B 60%, transparent); }
    .divider-diamond { width: 4px; height: 4px; background: #C8A84B; transform: rotate(45deg); }
    /* Bottom */
    .bottom { display: flex; align-items: center; justify-content: center; gap: 20px; z-index: 2; }
    .social { display: flex; flex-direction: column; gap: 6px; }
    .social-item { display: flex; align-items: center; gap: 6px; }
    .social-text { font-size: 8px; color: #2E2404; letter-spacing: 0.8px; }
    .social-text span { color: #A8881A; font-size: 7px; letter-spacing: 1px; display: block; text-transform: uppercase; }
    .v-divider { width: 0.4px; height: 48px; background: linear-gradient(180deg, transparent, #C8A84B 40%, #C8A84B 60%, transparent); }
    .qr-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .qr-frame { width: 52px; height: 52px; background: #FFFFFF; border-radius: 4px; padding: 3px; border: 0.5px solid rgba(200,168,75,0.4); }
    .qr-frame img { width: 100%; height: 100%; }
    .qr-label { font-size: 6px; letter-spacing: 1.5px; color: #2E2404; text-transform: uppercase; }
    @media print { body { margin: 0; background: white; } }
  </style>
</head>
<body>
  <div class="label">
    <div class="corner c-tl"></div>
    <div class="corner c-tr"></div>
    <div class="corner c-bl"></div>
    <div class="corner c-br"></div>

    <div class="top">
      <img class="logo" src="../public/logo.png" alt="Logo">
      <div class="brand">JEWELS BY GEETIKA</div>
      <div class="tagline">Hand-Curated Premium Jewellery</div>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line"></div>
    </div>

    <div class="bottom">
      <div class="social">
        <div class="social-item">
          <div class="social-text"><span>Website</span>www.jewelsbygeetika.com</div>
        </div>
        <div class="social-item">
          <div class="social-text"><span>Instagram</span>@jewelsbygeetika</div>
        </div>
      </div>
      <div class="v-divider"></div>
      <div class="qr-group">
        <div class="qr-frame">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://www.jewelsbygeetika.com&color=A8881A&bgcolor=FFFFFF" alt="QR">
        </div>
        <div class="qr-label">Scan to Shop</div>
      </div>
    </div>
  </div>
</body>
</html>
