<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jewels by Geetika – Box Label</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;500;600&family=Tenor+Sans&display=swap");

    * { margin: 0; padding: 0; box-sizing: border-box; }

    @page { size: 4in 3in; margin: 0; }

    body {
      width: 4in;
      height: 3in;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Tenor Sans", sans-serif;
    }

    /* 4x3 inch at 96dpi = 384x288px */
    .label {
      width: 384px;
      height: 288px;
      background: #0D0B08;
      border-radius: 18px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    /* Outer gold border */
    .label::before {
      content: "";
      position: absolute;
      inset: 4px;
      border: 0.5px solid rgba(200,160,60,0.55);
      border-radius: 14px;
      pointer-events: none;
      z-index: 10;
    }
    .label::after {
      content: "";
      position: absolute;
      inset: 7px;
      border: 0.3px solid rgba(200,160,60,0.2);
      border-radius: 11px;
      pointer-events: none;
      z-index: 10;
    }

    /* Subtle radial glow behind logo */
    .glow {
      position: absolute;
      width: 200px;
      height: 200px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -62%);
      background: radial-gradient(circle, rgba(200,160,60,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Top section: logo + brand name */
    .top {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 2;
      padding-top: 18px;
    }

    .logo {
      width: 68px;
      height: 68px;
      object-fit: contain;
      margin-bottom: 6px;
    }

    .brand-name {
      font-family: "Cormorant Garamond", serif;
      font-size: 17px;
      font-weight: 300;
      letter-spacing: 3px;
      color: #E8CEAA;
      line-height: 1;
    }
    .brand-name em {
      font-style: italic;
      color: #C8A03C;
    }

    .tagline {
      font-size: 6px;
      letter-spacing: 3px;
      color: rgba(200,160,60,0.6);
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 10px 0 8px;
      width: 300px;
      position: relative;
      z-index: 2;
    }
    .divider-line {
      flex: 1;
      height: 0.4px;
      background: linear-gradient(90deg, transparent, #C8A03C 40%, #C8A03C 60%, transparent);
    }
    .divider-diamond {
      width: 4px;
      height: 4px;
      background: #C8A03C;
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    /* Bottom section: social + QR */
    .bottom {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      position: relative;
      z-index: 2;
      padding-bottom: 16px;
    }

    /* Social info column */
    .social {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
    }

    .social-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .social-icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .social-text {
      font-size: 7.5px;
      color: #E8CEAA;
      letter-spacing: 0.8px;
      font-family: "Tenor Sans", sans-serif;
    }

    .social-text span {
      color: rgba(200,160,60,0.75);
      font-size: 6.5px;
      letter-spacing: 1px;
      display: block;
      text-transform: uppercase;
    }

    /* Vertical divider between social and QR */
    .v-divider {
      width: 0.4px;
      height: 48px;
      background: linear-gradient(180deg, transparent, #C8A03C 40%, #C8A03C 60%, transparent);
    }

    /* QR section */
    .qr-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .qr-frame {
      width: 52px;
      height: 52px;
      background: #E8CEAA;
      border-radius: 4px;
      padding: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qr-frame img {
      width: 100%;
      height: 100%;
      display: block;
    }

    .qr-label {
      font-size: 5.5px;
      letter-spacing: 1.5px;
      color: rgba(200,160,60,0.65);
      text-transform: uppercase;
    }

    /* Corner accent marks */
    .corner-mark {
      position: absolute;
      width: 14px;
      height: 14px;
      z-index: 5;
    }
    .cm-tl { top: 11px; left: 11px; border-top: 0.8px solid #C8A03C; border-left: 0.8px solid #C8A03C; border-radius: 2px 0 0 0; }
    .cm-tr { top: 11px; right: 11px; border-top: 0.8px solid #C8A03C; border-right: 0.8px solid #C8A03C; border-radius: 0 2px 0 0; }
    .cm-bl { bottom: 11px; left: 11px; border-bottom: 0.8px solid #C8A03C; border-left: 0.8px solid #C8A03C; border-radius: 0 0 0 2px; }
    .cm-br { bottom: 11px; right: 11px; border-bottom: 0.8px solid #C8A03C; border-right: 0.8px solid #C8A03C; border-radius: 0 0 2px 0; }

    @media print { body { margin: 0; } }
  </style>
</head>
