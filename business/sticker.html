<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jewels by Geetika – Sticker (Light Theme)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Jost:wght@300;400;500&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f0f0f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    /* 1.5 inch circle = 144px at 96dpi */
    .sticker {
      width: 144px;
      height: 144px;
      border-radius: 50%;
      background: linear-gradient(135deg, #FFFFFF, #F9F6F1, #F3E9DC);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 2px #C8A84B, 0 0 0 4px #FFFFFF, 0 0 0 5.5px #C8A84B;
    }
    .logo { width: 50px; height: 50px; object-fit: contain; margin-bottom: 4px; }
    .brand { font-family: 'Cinzel', serif; font-size: 9px; font-weight: 700; color: #B8941F; letter-spacing: 2px; }
    .sub { font-family: 'Jost', sans-serif; font-size: 6px; color: #585858; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px; }
    .curved-text { position: absolute; inset: 0; border-radius: 50%; }
    @media print { body { background: white; } }
  </style>
</head>
<body>
  <div class="sticker">
    <svg class="curved-text" viewBox="0 0 144 144" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <path id="topArc" d="M 18,72 A 54,54 0 1,1 126,72" />
        <path id="bottomArc" d="M 20,72 A 52,52 0 0,0 124,72" />
      </defs>
      <text font-family="Cinzel, serif" font-size="9" font-weight="600" fill="#B8941F" letter-spacing="2">
        <textPath href="#topArc" startOffset="50%" text-anchor="middle">JEWELS BY GEETIKA</textPath>
      </text>
      <text font-family="Jost, sans-serif" font-size="7" fill="#787878" letter-spacing="3">
        <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">✦ HAND-CURATED ✦</textPath>
      </text>
    </svg>
    <img class="logo" src="../public/logo.png" alt="Logo">
  </div>
</body>
</html>
