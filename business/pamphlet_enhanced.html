<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jewels by Geetika – Collection Pamphlet</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Tenor+Sans&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    @page {
      size: 148mm 210mm;
      margin: 0;
    }

    body {
      font-family: 'Tenor Sans', sans-serif;
      background: #0A0705;
      color: #F5EDD8;
      width: 148mm;
      height: 210mm;
      margin: 0 auto;
      overflow: hidden;
    }

    .pamphlet {
      width: 148mm;
      height: 210mm;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #0D0B08;
    }

    /* ─── Decorative background ─── */
    .bg-ornament {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* Gold border frame */
    .frame {
      position: absolute;
      inset: 3mm;
      border: 0.4px solid rgba(200,160,60,0.5);
      pointer-events: none;
      z-index: 10;
    }
    .frame::before {
      content: '';
      position: absolute;
      inset: 1.5mm;
      border: 0.2px solid rgba(200,160,60,0.2);
    }

    /* Corner ornaments */
    .corner {
      position: absolute;
      width: 8mm;
      height: 8mm;
      z-index: 11;
      pointer-events: none;
    }
    .corner svg { width: 100%; height: 100%; }
    .corner.tl { top: 3mm; left: 3mm; }
    .corner.tr { top: 3mm; right: 3mm; transform: scaleX(-1); }
    .corner.bl { bottom: 3mm; left: 3mm; transform: scaleY(-1); }
    .corner.br { bottom: 3mm; right: 3mm; transform: scale(-1); }

    /* ─── Header ─── */
    .header {
      position: relative;
      z-index: 5;
      text-align: center;
      padding: 6mm 10mm 3mm;
    }

    .header-eyebrow {
      font-family: 'Tenor Sans', sans-serif;
      font-size: 5pt;
      letter-spacing: 4px;
      color: #C8A03C;
      text-transform: uppercase;
      margin-bottom: 1.5mm;
    }

    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3.5mm;
      margin-bottom: 1mm;
    }

    .logo-img {
      height: 11mm;
      width: auto;
      filter: brightness(1.1) drop-shadow(0 0 3px rgba(200,160,60,0.4));
    }

    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18pt;
      font-weight: 300;
      letter-spacing: 3px;
      color: #E8CEAA;
      line-height: 1;
    }

    .brand-name em {
      font-style: italic;
      color: #C8A03C;
    }

    .tagline {
      font-size: 4.5pt;
      letter-spacing: 2.5px;
      color: rgba(200,160,60,0.7);
      text-transform: uppercase;
      margin-top: 1.5mm;
    }

    /* Gold divider with diamond */
    .divider {
      position: relative;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2mm;
      margin: 1.5mm 8mm;
    }
    .divider-line {
      flex: 1;
      height: 0.4px;
      background: linear-gradient(90deg, transparent, #C8A03C 40%, #C8A03C 60%, transparent);
    }
    .divider-diamond {
      width: 2mm;
      height: 2mm;
      background: #C8A03C;
      transform: rotate(45deg);
    }

    /* ─── Products ─── */
    .products {
      position: relative;
      z-index: 5;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.8mm;
      padding: 0 7mm;
      flex: 1;
    }

    .product {
      text-align: center;
      position: relative;
      cursor: default;
    }

    .img-wrapper {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: 0.8mm;
      margin-bottom: 1mm;
      background: #1A1410;
    }

    /* Gold shimmer border on img */
    .img-wrapper::before {
      content: '';
      position: absolute;
      inset: 0;
      border: 0.4px solid rgba(200,160,60,0.4);
      border-radius: 0.8mm;
      z-index: 2;
    }

    /* Corner accent top-left */
    .img-wrapper::after {
      content: '';
      position: absolute;
      top: 1.2mm;
      left: 1.2mm;
      width: 2.5mm;
      height: 2.5mm;
      border-top: 0.6px solid #C8A03C;
      border-left: 0.6px solid #C8A03C;
      z-index: 3;
    }

    .product img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: saturate(0.9) brightness(0.95);
    }

    .product-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 6pt;
      font-weight: 400;
      color: #E8CEAA;
      letter-spacing: 0.5px;
      line-height: 1.3;
    }

    .product-price {
      font-size: 5pt;
      color: #C8A03C;
      letter-spacing: 0.3px;
      font-family: 'Tenor Sans', sans-serif;
    }

    .product.empty { visibility: hidden; }

    /* ─── Footer ─── */
    .footer {
      position: relative;
      z-index: 5;
      text-align: center;
      padding: 2mm 8mm 5mm;
    }

    .qr-section {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 10mm;
      margin-bottom: 1.5mm;
    }

    .qr-item {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8mm;
    }

    .qr-frame {
      position: relative;
      width: 13mm;
      height: 13mm;
      padding: 0.5mm;
      background: #E8CEAA;
      border-radius: 0.5mm;
    }
    .qr-frame img {
      width: 100%;
      height: 100%;
      display: block;
    }

    .qr-label {
      font-size: 4pt;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(200,160,60,0.7);
      font-family: 'Tenor Sans', sans-serif;
    }

    .footer-url {
      font-family: 'Cormorant Garamond', serif;
      font-size: 6pt;
      font-style: italic;
      color: rgba(232,206,170,0.6);
      letter-spacing: 0.5px;
    }

    /* background sparkle dots */
    .sparkle {
      position: absolute;
      border-radius: 50%;
      background: #C8A03C;
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }

    @media print {
      body { margin: 0; }
    }
  </style>
</head>
<body>
<div class="pamphlet">

  <!-- Background sparkles -->
  <span class="sparkle" style="width:60mm;height:60mm;top:-20mm;right:-15mm;filter:blur(18mm);opacity:0.08;border-radius:50%;"></span>
  <span class="sparkle" style="width:45mm;height:45mm;bottom:-10mm;left:-10mm;filter:blur(14mm);opacity:0.07;border-radius:50%;"></span>
  <span class="sparkle" style="width:2px;height:2px;top:18mm;left:22mm;opacity:0.6;"></span>
  <span class="sparkle" style="width:1.5px;height:1.5px;top:32mm;right:18mm;opacity:0.5;"></span>
  <span class="sparkle" style="width:2px;height:2px;bottom:22mm;right:30mm;opacity:0.5;"></span>
  <span class="sparkle" style="width:1px;height:1px;top:80mm;left:14mm;opacity:0.7;"></span>

  <!-- Gold frame -->
  <div class="frame"></div>

  <!-- Corner ornaments -->
  <div class="corner tl">
    <svg viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 28 L2 2 L28 2" stroke="#C8A03C" stroke-width="1" fill="none"/>
      <path d="M2 14 L8 2" stroke="#C8A03C" stroke-width="0.6" fill="none"/>
      <circle cx="2" cy="2" r="1.5" fill="#C8A03C"/>
    </svg>
  </div>
  <div class="corner tr">
    <svg viewBox="0 0 30 30" fill="none">
      <path d="M2 28 L2 2 L28 2" stroke="#C8A03C" stroke-width="1" fill="none"/>
      <path d="M2 14 L8 2" stroke="#C8A03C" stroke-width="0.6" fill="none"/>
      <circle cx="2" cy="2" r="1.5" fill="#C8A03C"/>
    </svg>
  </div>
  <div class="corner bl">
    <svg viewBox="0 0 30 30" fill="none">
      <path d="M2 28 L2 2 L28 2" stroke="#C8A03C" stroke-width="1" fill="none"/>
      <path d="M2 14 L8 2" stroke="#C8A03C" stroke-width="0.6" fill="none"/>
      <circle cx="2" cy="2" r="1.5" fill="#C8A03C"/>
    </svg>
  </div>
  <div class="corner br">
    <svg viewBox="0 0 30 30" fill="none">
      <path d="M2 28 L2 2 L28 2" stroke="#C8A03C" stroke-width="1" fill="none"/>
      <path d="M2 14 L8 2" stroke="#C8A03C" stroke-width="0.6" fill="none"/>
      <circle cx="2" cy="2" r="1.5" fill="#C8A03C"/>
    </svg>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="header-eyebrow">Handcrafted Luxury</div>
    <div class="logo-row">
      <img class="logo-img" src="../public/logo.png" alt="Jewels by Geetika">
      <div>
        <div class="brand-name">Jewels <em>by</em> Geetika</div>
        <div class="tagline">Hand-Curated Premium Jewellery</div>
      </div>
    </div>
  </div>

  <!-- Divider -->
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-diamond"></div>
    <div class="divider-line"></div>
  </div>

  <!-- Products -->
  <div class="products">
    <div class="product">
      <div class="img-wrapper"><img src="../public/products/Kaveri/kaveri-1.png" alt="Kaveri"></div>
      <div class="product-name">Kaveri</div>
      <div class="product-price">₹1,999</div>
    </div>
    <div class="product">
      <div class="img-wrapper"><img src="../public/products/Raahi/raahi-1.png" alt="Raahi"></div>
      <div class="product-name">Raahi</div>
      <div class="product-price">₹4,499</div>
    </div>
    <div class="product">
      <div class="img-wrapper"><img src="../public/products/Saanjh/saanjh-1.png" alt="Saanjh"></div>
      <div class="product-name">Saanjh</div>
      <div class="product-price">₹5,499</div>
    </div>
    <div class="product">
      <div class="img-wrapper"><img src="../public/products/Adaa/adaa-1.png" alt="Adaa"></div>
      <div class="product-name">Adaa</div>
      <div class="product-price">₹3,999</div>
    </div>
    <div class="product">
      <div class="img-wrapper"><img src="../public/products/Ruhani/ruhani-1.png" alt="Ruhani"></div>
      <div class="product-name">Ruhani</div>
      <div class="product-price">₹3,999</div>
    </div>
    <div class="product">
      <div class="img-wrapper"><img src="../public/products/Kanak/kanak-1.png" alt="Kanak"></div>
      <div class="product-name">Kanak</div>
      <div class="product-price">₹1,999</div>
    </div>
    <div class="product">
      <div class="img-wrapper"><img src="../public/products/Sunehri/sunehri-1.png" alt="Sunehri"></div>
      <div class="product-name">Sunehri</div>
      <div class="product-price">₹999</div>
    </div>
    <div class="product">
      <div class="img-wrapper"><img src="../public/products/Virasat/virasat-1.png" alt="Virasat"></div>
      <div class="product-name">Virasat</div>
      <div class="product-price">₹999</div>
    </div>
    <div class="product">
      <div class="img-wrapper"><img src="../public/products/Antara/antara-1.png" alt="Antara"></div>
      <div class="product-name">Antara</div>
      <div class="product-price">₹3,999</div>
    </div>
    <div class="product">
      <div class="img-wrapper"><img src="../public/products/Chandni/chandni-1.png" alt="Chandni"></div>
      <div class="product-name">Chandni</div>
      <div class="product-price">₹3,999</div>
    </div>
    <div class="product">
      <div class="img-wrapper"><img src="../public/products/Rajsi/rajsi-1.png" alt="Rajsi"></div>
      <div class="product-name">Rajsi</div>
      <div class="product-price">₹2,999</div>
    </div>
    <div class="product empty"></div>
  </div>

  <!-- Divider -->
  <div class="divider" style="margin:1.5mm 8mm;">
    <div class="divider-line"></div>
    <div class="divider-diamond"></div>
    <div class="divider-line"></div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="qr-section">
      <div class="qr-item">
        <div class="qr-frame">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://www.jewelsbygeetika.com&color=0D0B08&bgcolor=E8CEAA" alt="Website QR">
        </div>
        <div class="qr-label">Shop Online</div>
      </div>
      <div class="qr-item">
        <div class="qr-frame">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://www.instagram.com/jewelsbygeetika/&color=0D0B08&bgcolor=E8CEAA" alt="Instagram QR">
        </div>
        <div class="qr-label">@jewelsbygeetika</div>
      </div>
    </div>
    <div class="footer-url">www.jewelsbygeetika.com</div>
  </div>

</div>
</body>
</html>
