<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thank You Card - Business Card Size</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Jost:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,400;1,400;1,500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    @page {
      size: 89mm 51mm;
      margin: 0;
    }

    body {
      font-family: 'Jost', sans-serif;
      width: 89mm;
      height: 51mm;
      margin: 20mm auto;
      background: #f5f5f5;
    }

    .card {
      width: 89mm;
      height: 51mm;
      background: linear-gradient(135deg, #FFFFFF 0%, #F9F6F1 60%, #F3E9DC 100%);
      border: 0.3px solid rgba(200,168,75,0.2);
      border-radius: 2mm;
      display: flex;
      overflow: hidden;
    }

    /* Left - QR Codes */
    .left {
      width: 35%;
      padding: 4mm;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 2mm;
      border-right: 0.3px solid rgba(200,168,75,0.15);
    }

    .qr-item {
      text-align: center;
    }

    .qr-item img {
      width: 12mm;
      height: 12mm;
    }

    .qr-label {
      font-size: 4pt;
      color: #787878;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 0.5mm;
    }

    /* Right - Thank You Note */
    .right {
      width: 65%;
      padding: 4mm 5mm;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .brand {
      font-family: 'Cinzel', serif;
      font-size: 8pt;
      font-weight: 700;
      color: #B8941F;
      letter-spacing: 2px;
      margin-bottom: 2mm;
    }

    .thank-you {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11pt;
      font-style: italic;
      color: #111111;
      margin-bottom: 2mm;
    }

    .message {
      font-size: 5.5pt;
      color: #585858;
      line-height: 1.5;
      font-weight: 300;
    }

    .signature {
      margin-top: 2mm;
      font-size: 6pt;
      color: #B8941F;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
    }

    @media print {
      body { margin: 0; background: white; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="left">
      <div class="qr-item">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://www.jewelsbygeetika.com&color=B8941F" alt="Website">
        <div class="qr-label">Website</div>
      </div>
      <div class="qr-item">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://www.instagram.com/jewelsbygeetika/&color=B8941F" alt="Instagram">
        <div class="qr-label">Instagram</div>
      </div>
    </div>
    <div class="right">
      <div class="brand">JEWELS BY GEETIKA</div>
      <div class="thank-you">Thank You ✦</div>
      <div class="message">
        Thank you for choosing us. Every piece is curated with love, keeping you in mind. We hope it makes you feel as beautiful as you are.
      </div>
      <div class="signature">— With love, Geetika</div>
    </div>
  </div>
</body>
</html>
