<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QR Codes - Jewels by Geetika</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #F9F6F1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 60px;
      padding: 50px;
      min-height: 100vh;
    }
    .qr-item img {
      width: 200px;
      height: 200px;
      display: block;
    }
  </style>
</head>
<body>
  <div class="qr-item">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=https://www.jewelsbygeetika.com&color=A8881A&bgcolor=F9F6F1" alt="Website QR">
  </div>
  <div class="qr-item">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=https://www.instagram.com/jewelsbygeetika/&color=A8881A&bgcolor=F9F6F1" alt="Instagram QR">
  </div>
</body>
</html>
