<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QR Codes - Jewels by Geetika</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: white; display: flex; flex-direction: column; align-items: center; gap: 40px; padding: 40px; font-family: sans-serif; }
    .qr-item { text-align: center; }
    .qr-item img { width: 200px; height: 200px; }
    .qr-item p { margin-top: 10px; font-size: 12px; color: #555; }
  </style>
</head>
<body>
  <div class="qr-item">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=https://www.jewelsbygeetika.com&color=000000&bgcolor=FFFFFF" alt="Website QR">
    <p>Website — www.jewelsbygeetika.com</p>
  </div>
  <div class="qr-item">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=https://www.instagram.com/jewelsbygeetika/&color=000000&bgcolor=FFFFFF" alt="Instagram QR">
    <p>Instagram — @jewelsbygeetika</p>
  </div>
</body>
</html>
