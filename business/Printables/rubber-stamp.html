<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rubber Stamp Design - Jewels by Geetika</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Jost:wght@300;400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Jost', sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 40px;
      padding: 40px;
    }

    h2 {
      font-family: 'Jost', sans-serif;
      font-weight: 400;
      color: #585858;
      font-size: 12pt;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Circular Stamp */
    .stamp-circular {
      width: 50mm;
      height: 50mm;
      border: 2.5px solid #111111;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      background: transparent;
    }

    .stamp-circular::before {
      content: '';
      position: absolute;
      inset: 2mm;
      border: 1px solid #111111;
      border-radius: 50%;
    }

    .stamp-circular .brand {
      font-family: 'Cinzel', serif;
      font-size: 10pt;
      font-weight: 700;
      letter-spacing: 2px;
      color: #111111;
    }

    .stamp-circular .sub {
      font-size: 6pt;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: #111111;
      margin-top: 1mm;
    }

    .stamp-circular .stars {
      font-size: 6pt;
      color: #111111;
      margin-top: 1.5mm;
      letter-spacing: 3px;
    }

    /* Rectangular Stamp */
    .stamp-rect {
      width: 60mm;
      height: 25mm;
      border: 2px solid #111111;
      border-radius: 2mm;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      background: transparent;
    }

    .stamp-rect::before {
      content: '';
      position: absolute;
      inset: 1.5mm;
      border: 0.8px solid #111111;
      border-radius: 1.5mm;
    }

    .stamp-rect .brand {
      font-family: 'Cinzel', serif;
      font-size: 12pt;
      font-weight: 700;
      letter-spacing: 3px;
      color: #111111;
    }

    .stamp-rect .sub {
      font-size: 6.5pt;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #111111;
      margin-top: 1mm;
    }

    /* Oval Stamp */
    .stamp-oval {
      width: 55mm;
      height: 35mm;
      border: 2px solid #111111;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      background: transparent;
    }

    .stamp-oval::before {
      content: '';
      position: absolute;
      inset: 2mm;
      border: 0.8px solid #111111;
      border-radius: 50%;
    }

    .stamp-oval .brand {
      font-family: 'Cinzel', serif;
      font-size: 9pt;
      font-weight: 700;
      letter-spacing: 2px;
      color: #111111;
    }

    .stamp-oval .sub {
      font-size: 5.5pt;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #111111;
      margin-top: 1mm;
    }

    .stamp-oval .website {
      font-size: 5pt;
      color: #111111;
      margin-top: 1.5mm;
      letter-spacing: 1px;
    }

    /* Print styles */
    @media print {
      body { background: white; }
    }
  </style>
</head>
<body>
  <h2>Option 1 — Circular</h2>
  <div class="stamp-circular">
    <div class="brand">JEWELS</div>
    <div class="sub">by Geetika</div>
    <div class="stars">✦ ✦ ✦</div>
  </div>

  <h2>Option 2 — Rectangular</h2>
  <div class="stamp-rect">
    <div class="brand">JEWELS</div>
    <div class="sub">by Geetika</div>
  </div>

  <h2>Option 3 — Oval</h2>
  <div class="stamp-oval">
    <div class="brand">JEWELS</div>
    <div class="sub">by Geetika</div>
    <div class="website">jewelsbygeetika.com</div>
  </div>
</body>
</html>
