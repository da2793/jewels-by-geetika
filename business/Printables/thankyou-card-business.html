<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thank You Card - Business Card Size (2 Sides)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Jost:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    @page {
      size: 89mm 51mm;
      margin: 0;
    }

    body {
      font-family: 'Jost', sans-serif;
      background: #F9F6F1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10mm;
      padding: 15mm;
    }

    .label {
      font-size: 8pt;
      color: #3A3A3A;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 3mm;
    }

    /* ── SIDE 1: Front — Logo + Brand Name ── */
    .card-front {
      width: 89mm;
      height: 51mm;
      background: linear-gradient(135deg, #FFFFFF 0%, #FDFCFA 50%, #F9F6F1 100%);
      border: 0.5px solid rgba(200,168,75,0.4);
      border-radius: 2mm;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .card-front .logo {
      height: 16mm;
      width: auto;
      margin-bottom: 3mm;
    }

    .card-front .brand {
      font-family: 'Cinzel', serif;
      font-size: 11pt;
      font-weight: 700;
      color: #2E2404;
      letter-spacing: 3px;
    }

    .card-front .sub {
      font-size: 6pt;
      color: #574508;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 1.5mm;
    }

    .card-front .divider {
      width: 12mm;
      height: 0.5px;
      background: linear-gradient(90deg, transparent, #C8A84B, transparent);
      margin: 2.5mm 0;
    }

    .card-front .contact-bottom {
      position: absolute;
      bottom: 3mm;
      font-size: 4.5pt;
      color: #574508;
      letter-spacing: 0.8px;
    }

    /* ── SIDE 2: Back — QR + Thank You ── */
    .card-back {
      width: 89mm;
      height: 51mm;
      background: linear-gradient(135deg, #FFFFFF 0%, #FDFCFA 50%, #F9F6F1 100%);
      border: 0.5px solid rgba(200,168,75,0.4);
      border-radius: 2mm;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    .card-back .left {
      width: 35%;
      padding: 4mm;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 2mm;
      border-right: 0.3px solid rgba(200,168,75,0.25);
    }

    .card-back .qr-item {
      text-align: center;
    }

    .card-back .qr-item img {
      width: 12mm;
      height: 12mm;
    }

    .card-back .qr-label {
      font-size: 4pt;
      color: #2E2404;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 0.5mm;
    }

    .card-back .right {
      width: 65%;
      padding: 4mm 5mm;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .card-back .thank-you {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11pt;
      font-style: italic;
      color: #2E2404;
      margin-bottom: 2mm;
    }

    .card-back .message {
      font-size: 5.5pt;
      color: #3A3A3A;
      line-height: 1.5;
      font-weight: 300;
    }

    .card-back .signature {
      margin-top: 2mm;
      font-size: 6pt;
      color: #2E2404;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
    }

    .card-back .contact-bottom {
      position: absolute;
      bottom: 2.5mm;
      right: 4mm;
      font-size: 4pt;
      color: #3A3A3A;
      letter-spacing: 0.5px;
    }

    @media print {
      body { background: white; padding: 0; gap: 0; }
      .label { display: none; }
      .card-front { page-break-after: always; }
    }
  </style>
</head>
<body>
  <!-- SIDE 1: Front -->
  <div class="label">Side 1 — Front</div>
  <div class="card-front">
    <img src="../public/logo.png" alt="Logo" class="logo">
    <div class="brand">JEWELS BY GEETIKA</div>
    <div class="divider"></div>
    <div class="sub">Hand-Curated Premium Jewellery</div>
    <div class="contact-bottom">www.jewelsbygeetika.com</div>
  </div>

  <!-- SIDE 2: Back -->
  <div class="label">Side 2 — Back</div>
  <div class="card-back">
    <div class="left">
      <div class="qr-item">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://www.jewelsbygeetika.com&color=A8881A&bgcolor=FFFFFF" alt="Website">
        <div class="qr-label">Website</div>
      </div>
      <div class="qr-item">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://www.instagram.com/jewelsbygeetika/&color=A8881A&bgcolor=FFFFFF" alt="Instagram">
        <div class="qr-label">Instagram</div>
      </div>
    </div>
    <div class="right">
      <div class="thank-you">Thank You ✦</div>
      <div class="message">
        Thank you for choosing us. Every piece is curated with love, keeping you in mind. We hope it makes you feel as beautiful as you are.
      </div>
      <div class="signature">— With love, Geetika</div>
    </div>
    <div class="contact-bottom" style="display:none;"></div>
  </div>
</body>
</html>
