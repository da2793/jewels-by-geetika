<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jewels by Geetika - Pamphlet</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Jost:wght@300;400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    @page {
      size: 148mm 210mm;
      margin: 0;
    }

    body {
      font-family: 'Jost', sans-serif;
      background: #FFFFFF;
      color: #111111;
      width: 148mm;
      height: 210mm;
      margin: 0 auto;
      overflow: hidden;
    }

    .pamphlet {
      width: 148mm;
      height: 210mm;
      padding: 5mm 6mm;
      display: flex;
      flex-direction: column;
      background: linear-gradient(180deg, #FFFFFF 0%, #F9F6F1 50%, #F3E9DC 100%);
    }

    /* Header with Logo */
    .header {
      text-align: center;
      margin-bottom: 3mm;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3mm;
    }

    .header img {
      height: 12mm;
      width: auto;
    }

    .header-text {
      text-align: left;
    }

    .brand-name {
      font-family: 'Cinzel', serif;
      font-size: 14pt;
      font-weight: 700;
      color: #B8941F;
      letter-spacing: 2px;
    }

    .tagline {
      font-size: 6pt;
      color: #585858;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .divider {
      width: 100%;
      height: 0.5px;
      background: linear-gradient(90deg, transparent, #C8A84B, transparent);
      margin: 2mm 0;
    }

    /* Product Grid */
    .products {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2mm;
      flex: 1;
    }

    .product {
      text-align: center;
      background: rgba(255,255,255,0.7);
      border-radius: 2mm;
      padding: 1.5mm;
      border: 0.3px solid rgba(200,168,75,0.12);
    }

    .product img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 1.5mm;
      margin-bottom: 1mm;
    }

    .product-name {
      font-family: 'Cinzel', serif;
      font-size: 5.5pt;
      font-weight: 600;
      color: #111111;
    }

    .product-price {
      font-size: 5.5pt;
      color: #B8941F;
      font-weight: 500;
    }

    .product.empty {
      border: none;
      background: none;
    }

    /* Footer */
    .footer {
      margin-top: 2mm;
      text-align: center;
      padding-top: 2mm;
      border-top: 0.5px solid rgba(200,168,75,0.2);
    }

    .qr-section {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8mm;
      margin-bottom: 1.5mm;
    }

    .qr-item {
      text-align: center;
    }

    .qr-item img {
      width: 14mm;
      height: 14mm;
    }

    .qr-label {
      font-size: 4.5pt;
      color: #585858;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-top: 0.5mm;
    }

    .footer-text {
      font-size: 5pt;
      color: #787878;
      letter-spacing: 0.8px;
    }

    @media print {
      body { margin: 0; }
    }
  </style>
</head>
<body>
  <div class="pamphlet">
    <!-- Header with Logo -->
    <div class="header">
      <img src="../public/logo.png" alt="Jewels by Geetika Logo">
      <div class="header-text">
        <div class="brand-name">JEWELS BY GEETIKA</div>
        <div class="tagline">Hand-Curated Premium Jewellery</div>
      </div>
    </div>
    <div class="divider"></div>

    <!-- Products Grid - 4 columns, 3 rows = 12 slots for 11 products -->
    <div class="products">
      <div class="product">
        <img src="../public/products/Kaveri/kaveri-1.png" alt="Kaveri">
        <div class="product-name">Kaveri</div>
        <div class="product-price">₹1,999</div>
      </div>
      <div class="product">
        <img src="../public/products/Raahi/raahi-1.png" alt="Raahi">
        <div class="product-name">Raahi</div>
        <div class="product-price">₹4,499</div>
      </div>
      <div class="product">
        <img src="../public/products/Saanjh/saanjh-1.png" alt="Saanjh">
        <div class="product-name">Saanjh</div>
        <div class="product-price">₹5,499</div>
      </div>
      <div class="product">
        <img src="../public/products/Adaa/adaa-1.png" alt="Adaa">
        <div class="product-name">Adaa</div>
        <div class="product-price">₹3,999</div>
      </div>
      <div class="product">
        <img src="../public/products/Ruhani/ruhani-1.png" alt="Ruhani">
        <div class="product-name">Ruhani</div>
        <div class="product-price">₹3,999</div>
      </div>
      <div class="product">
        <img src="../public/products/Kanak/kanak-1.png" alt="Kanak">
        <div class="product-name">Kanak</div>
        <div class="product-price">₹1,999</div>
      </div>
      <div class="product">
        <img src="../public/products/Sunehri/sunehri-1.png" alt="Sunehri">
        <div class="product-name">Sunehri</div>
        <div class="product-price">₹999</div>
      </div>
      <div class="product">
        <img src="../public/products/Virasat/virasat-1.png" alt="Virasat">
        <div class="product-name">Virasat</div>
        <div class="product-price">₹999</div>
      </div>
      <div class="product">
        <img src="../public/products/Antara/antara-1.png" alt="Antara">
        <div class="product-name">Antara</div>
        <div class="product-price">₹3,999</div>
      </div>
      <div class="product">
        <img src="../public/products/Chandni/chandni-1.png" alt="Chandni">
        <div class="product-name">Chandni</div>
        <div class="product-price">₹3,999</div>
      </div>
      <div class="product">
        <img src="../public/products/Rajsi/rajsi-1.png" alt="Rajsi">
        <div class="product-name">Rajsi</div>
        <div class="product-price">₹2,999</div>
      </div>
      <div class="product empty"></div>
    </div>

    <!-- Footer with QR codes -->
    <div class="footer">
      <div class="qr-section">
        <div class="qr-item">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://www.jewelsbygeetika.com&color=B8941F" alt="Website QR">
          <div class="qr-label">Website</div>
        </div>
        <div class="qr-item">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://www.instagram.com/jewelsbygeetika/&color=B8941F" alt="Instagram QR">
          <div class="qr-label">Instagram</div>
        </div>
      </div>
      <div class="footer-text">www.jewelsbygeetika.com</div>
    </div>
  </div>
</body>
</html>
